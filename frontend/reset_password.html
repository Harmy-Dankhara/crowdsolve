<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CrowdSolve</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f8fafc, #eef2f7); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 16px; width: 380px; border: 1px solid #e6eaf0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .login-logo { font-size: 1.4rem; font-weight: 700; color: #4f46e5; text-align: center; margin-bottom: 6px; letter-spacing: -0.02em; }
        .login-subtitle { text-align: center; font-size: 14px; color: #6b7280; margin-bottom: 28px; }
        .login-field { margin-bottom: 4px; }
        .login-field label { display: block; font-size: 0.85rem; font-weight: 500; color: #334155; margin-bottom: 6px; }
        .login-field input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; margin-top: 4px; margin-bottom: 16px; font-size: 14px; font-family: 'Inter', sans-serif; color: #0f172a; background: #f8fafc; outline: none; box-sizing: border-box; transition: border-color 0.2s ease; }
        .login-field input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); background: white; }
        .login-btn { width: 100%; padding: 12px; margin-top: 4px; background: linear-gradient(135deg, #2563eb, #4f46e5); color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s ease; }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 16px rgba(37,99,235,0.25); }
        .login-error { display: none; color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-top: 14px; text-align: center; }
        .login-success { display: none; color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-top: 14px; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 18px; font-size: 0.85rem; color: #64748b; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: #4f46e5; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">CrowdSolve</div>
        <p class="login-subtitle">Set New Password</p>

        <div class="login-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Your registered email" readonly style="opacity:0.7; cursor:not-allowed;">
        </div>
        <div class="login-field">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" placeholder="Enter your new password">
        </div>
        <div class="login-field">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Re-enter your new password">
        </div>

        <button class="login-btn" id="resetBtn">Reset Password →</button>
        <div class="login-error" id="resetError"></div>
        <div class="login-success" id="resetSuccess"></div>

        <a href="authority_login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        // Pre-fill email from URL query param
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email") || "";
        document.getElementById("email").value = email;

        document.getElementById("resetBtn").addEventListener("click", async function () {
            const email = document.getElementById("email").value.trim();
            const new_password = document.getElementById("new_password").value.trim();
            const confirm = document.getElementById("confirm_password").value.trim();
            const errorEl = document.getElementById("resetError");
            const successEl = document.getElementById("resetSuccess");

            errorEl.style.display = "none";
            successEl.style.display = "none";

            if (!new_password || !confirm) {
                errorEl.textContent = "Please fill in all fields.";
                errorEl.style.display = "block";
                return;
            }

            if (new_password !== confirm) {
                errorEl.textContent = "❌ Passwords do not match.";
                errorEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch("http://127.0.0.1:8000/authority/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, new_password })
                });

                const data = await response.json();

                if (response.ok) {
                    successEl.textContent = "✅ Password updated! Redirecting to login...";
                    successEl.style.display = "block";
                    setTimeout(() => window.location.href = "authority_login.html", 1800);
                } else {
                    errorEl.textContent = "❌ " + (data.detail || "Reset failed.");
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = "❌ Could not connect to the server.";
                errorEl.style.display = "block";
            }
        });

        document.addEventListener("keydown", e => {
            if (e.key === "Enter") document.getElementById("resetBtn").click();
        });
    </script>
</body>
</html>
