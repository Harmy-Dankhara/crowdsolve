<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CrowdSolve</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f8fafc, #eef2f7); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 16px; width: 380px; border: 1px solid #e6eaf0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .login-logo { font-size: 1.4rem; font-weight: 700; color: #4f46e5; text-align: center; margin-bottom: 6px; letter-spacing: -0.02em; }
        .login-subtitle { text-align: center; font-size: 14px; color: #6b7280; margin-bottom: 28px; }
        .login-field { margin-bottom: 4px; }
        .login-field label { display: block; font-size: 0.85rem; font-weight: 500; color: #334155; margin-bottom: 6px; }
        .login-field input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; margin-top: 4px; margin-bottom: 16px; font-size: 14px; font-family: 'Inter', sans-serif; color: #0f172a; background: #f8fafc; outline: none; box-sizing: border-box; transition: border-color 0.2s ease; }
        .login-field input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); background: white; }
        .login-btn { width: 100%; padding: 12px; margin-top: 4px; background: linear-gradient(135deg, #2563eb, #4f46e5); color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s ease; }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 16px rgba(37,99,235,0.25); }
        .login-error { display: none; color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-top: 14px; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 18px; font-size: 0.85rem; color: #64748b; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: #4f46e5; }
        .hint { font-size: 0.82rem; color: #94a3b8; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">CrowdSolve</div>
        <p class="login-subtitle">Forgot Password</p>
        <p class="hint">Enter your registered email address and we'll take you to the password reset page.</p>

        <div class="login-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your registered email">
        </div>

        <button class="login-btn" id="continueBtn">Continue →</button>
        <div class="login-error" id="fpError"></div>

        <a href="authority_login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        document.getElementById("continueBtn").addEventListener("click", async function () {
            const email = document.getElementById("email").value.trim();
            const errorEl = document.getElementById("fpError");
            errorEl.style.display = "none";

            if (!email) {
                errorEl.textContent = "Please enter your email address.";
                errorEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch("http://127.0.0.1:8000/authority/check-email", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password: "" })
                });

                if (response.ok) {
                    window.location.href = `reset_password.html?email=${encodeURIComponent(email)}`;
                } else {
                    errorEl.textContent = "❌ No authority account found with this email.";
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = "❌ Could not connect to the server.";
                errorEl.style.display = "block";
            }
        });

        document.addEventListener("keydown", e => {
            if (e.key === "Enter") document.getElementById("continueBtn").click();
        });
    </script>
</body>
</html>
