<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - CrowdSolve</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="app-layout">
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-logo">CrowdSolve</a>
        <ul class="sidebar-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="report.html" class="active">Report Issue</a></li>
            <li><a href="issues.html">Issues</a></li>
            <li><a href="analytics.html">Analytics</a></li>
            <li><a href="map.html">Map</a></li>
            <li><a href="authority_login.html">🔒 Authority Login</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="form-card" style="margin: 0 auto;">
            <h2>Report a Community Issue</h2>
            <p class="form-subtitle">Please provide detailed information about the infrastructure issue you observed.</p>

            <form id="reportForm" class="issue-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="E.g., Large pothole on Main Street" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="5" placeholder="Describe the issue in detail..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="location" name="location" placeholder="Specific address or intersection" required style="flex: 1;">
                        <button type="button" id="openMapModalBtn" class="btn btn-secondary" style="padding: 0 1rem; height: 46px; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; min-width: max-content; font-weight: 500; font-size: 0.95rem; cursor: pointer;" title="Pick on map">
                            📍 Map
                        </button>
                    </div>
                    <input type="hidden" id="latitude" name="latitude">
                    <input type="hidden" id="longitude" name="longitude">
                </div>

                <div class="form-group">
                    <label for="image">Upload Image</label>
                    <input type="file" id="image" name="image" accept="image/*" class="file-input">
                </div>

                <button type="submit" class="btn btn-primary submit-btn">Submit Issue</button>
            </form>
        </div>
    </main>

    <div id="mapPickerModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px; padding: 2rem;">
            <span class="close-picker-modal close-modal">&times;</span>
            <h3 style="margin-bottom: 0.5rem; text-align: center; font-size: 1.25rem;">Pick Location on Map</h3>
            <p style="text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 1rem;">Click anywhere on the map to select location</p>
            <div id="locationPickerMap" style="height: 300px; width: 100%; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; z-index: 1;"></div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button type="button" id="cancelMapBtn" class="btn btn-secondary" style="padding: 0.6rem 1.5rem; border-radius: 8px;">Cancel</button>
                <button type="button" id="confirmMapBtn" class="btn btn-primary" style="padding: 0.6rem 1.5rem; border-radius: 8px;">Confirm Location</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
