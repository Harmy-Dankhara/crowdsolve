<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Login - CrowdSolve</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            border: 1px solid #e6eaf0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .login-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4f46e5;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 25px;
        }

        .login-field {
            margin-bottom: 4px;
        }

        .login-field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
        }

        .login-field input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            margin-top: 4px;
            margin-bottom: 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-sizing: border-box;
        }

        .login-field input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
            background: white;
        }

        .login-field input::placeholder {
            color: #94a3b8;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(37,99,235,0.25);
        }

        .login-error {
            display: none;
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-top: 14px;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #4f46e5;
        }

        .badge-authority {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 24px;
        }

        .badge-authority span {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4f46e5;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            padding: 4px 12px;
            border-radius: 999px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>

</head>
<body>
    <div class="login-card">
        <div class="login-logo">CrowdSolve</div>
        <p class="login-subtitle">Authority Access Portal</p>

        <div class="badge-authority">
            <span>🔒 Secure Login</span>
        </div>

        <div class="login-field">
            <label for="username">Email Address</label>
            <input type="email" id="username" placeholder="Enter authority email" autocomplete="off">
        </div>

        <div class="login-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="login-btn" id="loginBtn">Login as Authority →</button>

        <div class="login-error" id="loginError">
            ❌ Invalid email or password. Please try again.
        </div>

        <a href="authority_signup.html" class="back-link" style="margin-top:18px;">Don't have an account? <strong>Create Account</strong></a>
        <a href="forgot_password.html" class="back-link" style="margin-top:8px; color:#94a3b8;">Forgot password?</a>
        <a href="index.html" class="back-link" style="margin-top:8px; color:#94a3b8;">← Back to CrowdSolve</a>
    </div>

    <script>
        // If already logged in, redirect to dashboard
        if (localStorage.getItem("authority_logged_in") === "true") {
            window.location.href = "dashboard.html";
        }

        document.getElementById("loginBtn").addEventListener("click", async function () {
            const email = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorEl = document.getElementById("loginError");
            errorEl.style.display = "none";

            if (!email || !password) {
                errorEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch("http://127.0.0.1:8000/authority/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem("authority_logged_in", "true");
                    localStorage.setItem("authority_name", data.name);
                    localStorage.setItem("authority_email", data.email);
                    localStorage.setItem("authority_department", data.department);
                    window.location.href = "dashboard.html";
                } else {
                    errorEl.style.display = "block";
                    document.getElementById("password").value = "";
                }
            } catch (err) {
                errorEl.textContent = "❌ Could not connect to the server.";
                errorEl.style.display = "block";
            }
        });

        // Allow pressing Enter to submit
        document.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                document.getElementById("loginBtn").click();
            }
        });
    </script>
</body>
</html>
